<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OMRP</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   OMRP — Cyberpunk Enterprise Design System
   Inspired by: terminal aesthetics, neon-noir, enterprise dashboards
   ═══════════════════════════════════════════════════════════════════ */
:root{
  --bg0:#060912;--bg1:#090e1c;--bg2:#0d1428;--bg3:#111b35;--bg4:#1a2540;
  --border:#1e2d4a;--border2:#253550;--border-accent:#0080ff30;
  --text0:#e2eaf5;--text1:#a0b4cc;--text2:#5a6f88;--text3:#3a4f68;
  --cyan:#00e5ff;--blue:#0080ff;--purple:#8040ff;--green:#00ff88;
  --orange:#ff8800;--red:#ff2244;--pink:#ff00aa;
  --cyan-dim:#00e5ff18;--blue-dim:#0080ff18;--green-dim:#00ff8818;
  --red-dim:#ff224418;--orange-dim:#ff880018;
  --mono:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;
  --shadow:0 4px 24px #00000060;
  --glow-cyan:0 0 12px #00e5ff30;
  --glow-blue:0 0 12px #0080ff40;
  --glow-green:0 0 12px #00ff8830;
  --transition:150ms cubic-bezier(.4,0,.2,1);
  --sidebar-w:220px;--topbar-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg0);color:var(--text0);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:var(--sans);font-size:13px}
input,select,textarea{font-family:var(--sans);font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── Loading ─────────────────────────────────────────────────────────────── */
#pg-loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Login ───────────────────────────────────────────────────────────────── */
#pg-login{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg0)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:40px 36px;width:min(400px,92vw);box-shadow:var(--shadow)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-logo .icon{font-size:28px;line-height:1}
.login-logo h1{font-size:22px;font-weight:700;color:var(--cyan);font-family:var(--mono);letter-spacing:-.02em}
.login-logo span{font-size:11px;color:var(--text2);display:block;margin-top:1px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;font-weight:500}
.form-input{width:100%;background:var(--bg1);border:1px solid var(--border);color:var(--text0);border-radius:var(--r6);padding:9px 12px;outline:none;transition:border-color var(--transition)}
.form-input:focus{border-color:var(--blue);box-shadow:var(--glow-blue)}
.form-input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r6);font-weight:600;border:none;transition:all var(--transition);white-space:nowrap;letter-spacing:.01em}
.btn-primary{background:var(--blue);color:#fff;box-shadow:var(--glow-blue)}
.btn-primary:hover{background:#0066dd;box-shadow:0 0 20px #0080ff60}
.btn-secondary{background:var(--bg3);color:var(--text1);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg4);border-color:var(--text3)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid var(--red)30}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid var(--green)30}
.btn-success:hover{background:var(--green);color:#000}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text0)}
.btn-full{width:100%;justify-content:center;padding:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.login-err{background:var(--red-dim);border:1px solid var(--red)40;color:var(--red);padding:9px 12px;border-radius:var(--r6);font-size:12px;margin-bottom:14px;display:none}

/* ── Setup wizard ────────────────────────────────────────────────────────── */
#pg-setup{display:flex;align-items:center;justify-content:center;height:100vh}
.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r12);padding:40px 36px;width:min(460px,92vw);box-shadow:var(--shadow)}
.setup-steps{display:flex;gap:6px;margin-bottom:28px}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background var(--transition)}
.step-dot.active{background:var(--cyan)}
.step-dot.done{background:var(--green)}
.setup-title{font-size:18px;font-weight:700;margin-bottom:6px}
.setup-sub{font-size:13px;color:var(--text2);margin-bottom:24px}

/* ── App shell ───────────────────────────────────────────────────────────── */
#pg-app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
#sidebar{width:var(--sidebar-w);background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-logo-text{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--cyan);letter-spacing:-.02em}
.sb-logo-sub{font-size:10px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.sb-user{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.sb-user-name{font-size:12px;font-weight:600;color:var(--text0)}
.sb-user-role{font-size:10px;color:var(--text2);letter-spacing:.04em}
.sb-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:10px;margin-left:4px}
.sb-badge.admin{background:#8040ff22;color:var(--purple);border:1px solid #8040ff30}
.sb-badge.user{background:#0080ff22;color:var(--blue);border:1px solid #0080ff30}
.sb-section{padding:10px 0}
.sb-section-label{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:4px 16px 2px}
.sb-link{display:flex;align-items:center;gap:9px;padding:7px 14px 7px 16px;color:var(--text2);font-size:13px;font-weight:500;border-left:3px solid transparent;transition:all var(--transition);cursor:pointer}
.sb-link:hover{color:var(--text0);background:var(--bg2)}
.sb-link.active{color:var(--cyan);border-left-color:var(--cyan);background:var(--cyan-dim)}
.sb-link .icon{width:16px;text-align:center;font-size:14px;opacity:.8}
.sb-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}

/* ── Main ────────────────────────────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar-h);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--text0)}
.topbar-sub{font-size:12px;color:var(--text2)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:var(--glow-green);display:inline-block}
#content-area{flex:1;overflow-y:auto;padding:24px}

/* ── Cards / panels ──────────────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r8);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--text1);letter-spacing:.02em;text-transform:uppercase}
.card-body{padding:18px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r8);padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 60%,var(--border)40);pointer-events:none}
.stat-value{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--text0);line-height:1.1}
.stat-label{font-size:11px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-top:5px}
.stat-card.cyan .stat-value{color:var(--cyan)}
.stat-card.blue .stat-value{color:var(--blue)}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.purple .stat-value{color:var(--purple)}
.stat-icon{position:absolute;right:14px;top:14px;font-size:22px;opacity:.15}

/* ── Tables ──────────────────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--bg3);padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)18;transition:background var(--transition)}
tbody tr:hover{background:var(--bg3)60}
tbody td{padding:10px 14px;font-size:13px;color:var(--text1);vertical-align:middle}
.mono{font-family:var(--mono);font-size:12px}
.tbl-actions{display:flex;gap:6px;flex-wrap:nowrap}

/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:10px}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green)30}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid var(--red)30}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue)30}
.badge-purple{background:#8040ff18;color:var(--purple);border:1px solid #8040ff30}
.badge-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.badge-orange{background:var(--orange-dim);color:var(--orange);border:1px solid var(--orange)30}

/* ── Forms ───────────────────────────────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-select{width:100%;background:var(--bg1);border:1px solid var(--border);color:var(--text0);border-radius:var(--r6);padding:9px 12px;outline:none;transition:border-color var(--transition);appearance:none}
.form-select:focus{border-color:var(--blue)}
.form-hint{font-size:11px;color:var(--text2)}
.form-row{display:flex;gap:10px;align-items:flex-end}

/* ── Modal ───────────────────────────────────────────────────────────────── */
#modal-overlay{display:none;position:fixed;inset:0;background:#00000080;backdrop-filter:blur(2px);z-index:1000;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r12);padding:28px;width:min(500px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px #00000080;animation:modal-in .15s ease}
@keyframes modal-in{from{transform:translateY(-16px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:22px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}

/* ── Key reveal box ──────────────────────────────────────────────────────── */
.key-box{background:var(--bg1);border:1px solid var(--green)40;border-radius:var(--r6);padding:12px;margin:12px 0;display:flex;align-items:center;gap:10px}
.key-val{flex:1;font-family:var(--mono);font-size:11px;color:var(--green);word-break:break-all;line-height:1.6}
.key-note{font-size:11px;color:var(--orange);margin-top:8px;padding:8px 12px;background:var(--orange-dim);border-radius:var(--r4);border:1px solid var(--orange)30}

/* ── Toasts ──────────────────────────────────────────────────────────────── */
#toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:2000}
.toast{padding:11px 16px;border-radius:var(--r6);font-size:13px;font-weight:500;animation:toast-in .2s ease;max-width:340px;box-shadow:var(--shadow)}
@keyframes toast-in{from{transform:translateX(20px);opacity:0}}
.toast.ok{background:var(--green-dim);border:1px solid var(--green)40;color:var(--green)}
.toast.err{background:var(--red-dim);border:1px solid var(--red)40;color:var(--red)}
.toast.info{background:var(--blue-dim);border:1px solid var(--blue)40;color:var(--blue)}

/* ── Charts ──────────────────────────────────────────────────────────────── */
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px;padding-bottom:20px;position:relative}
.chart-bar{flex:1;background:var(--blue-dim);border:1px solid var(--blue)30;border-radius:var(--r4) var(--r4) 0 0;min-height:4px;transition:background var(--transition);position:relative}
.chart-bar:hover{background:var(--blue)40}
.chart-bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);padding:4px 8px;border-radius:var(--r4);font-size:11px;white-space:nowrap;margin-bottom:4px}
.chart-bar:hover .tip{display:block}
.chart-label{position:absolute;bottom:0;font-size:9px;color:var(--text3);transform:translateX(-50%)}

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--text2);gap:10px}
.empty-icon{font-size:36px;opacity:.4}
.empty-title{font-size:14px;font-weight:600;color:var(--text1)}
.empty-sub{font-size:13px;text-align:center}

/* ── Section header ──────────────────────────────────────────────────────── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700;color:var(--text0)}
.section-sub{font-size:12px;color:var(--text2);margin-top:1px}

/* ── Cyberpunk accent lines ──────────────────────────────────────────────── */
.accent-line{height:1px;background:linear-gradient(90deg,var(--cyan)80,transparent);margin:0 0 20px;opacity:.3}
.panel-glow{box-shadow:inset 0 0 30px var(--blue-dim)}

/* ── Provider icon ───────────────────────────────────────────────────────── */
.prov-icon{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:var(--r4);font-size:10px;font-weight:700;font-family:var(--mono)}
.pi-openrouter{background:#ff6600;color:#fff}
.pi-kilo{background:#0080ff;color:#fff}
.pi-cerebras{background:#8040ff;color:#fff}
.pi-groq{background:#ff00aa;color:#fff}
.pi-buw{background:#00e5ff;color:#000}
.pi-other{background:var(--bg3);color:var(--text1)}

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:768px){
  :root{--sidebar-w:200px}
  .stats-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){
  #sidebar{display:none}
  .stats-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="pg-loading"><div class="spinner"></div><span style="color:var(--text2);font-size:12px">Loading OMRP…</span></div>

<!-- Login -->
<div id="pg-login" style="display:none">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">⚡</span>
      <div><h1>OMRP</h1><span>Open Model Routing Protocol</span></div>
    </div>
    <div id="login-err" class="login-err"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input id="l-user" class="form-input" type="text" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="l-pass" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
    <p style="text-align:center;font-size:11px;color:var(--text2);margin-top:16px">OMRP LLM Router &mdash; <span id="app-name">OMRP</span></p>
  </div>
</div>

<!-- Setup wizard -->
<div id="pg-setup" style="display:none">
  <div class="setup-card">
    <div class="setup-steps">
      <div class="step-dot" id="sdot0"></div>
      <div class="step-dot" id="sdot1"></div>
      <div class="step-dot" id="sdot2"></div>
    </div>
    <div id="setup-body"></div>
  </div>
</div>

<!-- App -->
<div id="pg-app" style="display:none">
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-text">⚡ OMRP</div>
      <div class="sb-logo-sub" id="sb-appname">Dashboard</div>
    </div>
    <div class="sb-user">
      <div class="sb-user-name" id="sb-username">—</div>
      <div class="sb-user-role" id="sb-role"></div>
    </div>
    <nav id="sb-nav"></nav>
    <div class="sb-bottom">
      <button class="btn btn-ghost" style="width:100%;font-size:12px" onclick="doLogout()">⎋ Sign out</button>
    </div>
  </aside>
  <div id="main">
    <div id="topbar">
      <div>
        <div class="topbar-title" id="tb-title">Dashboard</div>
      </div>
      <div class="topbar-right">
        <span class="status-dot"></span>
        <span style="font-size:11px;color:var(--text2)">Connected</span>
      </div>
    </div>
    <div id="content-area"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toasts"></div>

<!-- Modal -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  OMRP SPA — Core
// ═══════════════════════════════════════════════════════════════════

const S = { user:null, token:null, page:'', appName:'OMRP' };

// ── API ────────────────────────────────────────────────────────────
async function api(method, path, body, raw=false) {
  const headers = { 'Content-Type': 'application/json' };
  if (S.token) headers['Authorization'] = 'Bearer ' + S.token;
  const res = await fetch(path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (raw) return res;
  return res.json().catch(() => ({ error: { message: 'Network error' } }));
}
const GET  = (p) => api('GET',    p);
const POST = (p, b) => api('POST',   p, b);
const PUT  = (p, b) => api('PUT',    p, b);
const DEL  = (p) => api('DELETE', p);

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg, type='ok', ms=3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

// ── Modal ──────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── Helpers ────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate = ts => ts ? new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
const fmtDatetime = ts => ts ? new Date(ts*1000).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
const yesno = v => v ? '<span class="badge badge-green">●&thinsp;active</span>' : '<span class="badge badge-red">○&thinsp;inactive</span>';
const provIcon = p => {
  const m = {openrouter:'OR',kilo:'K',cerebras:'CB',groq:'GQ',buw:'BW'};
  const c = {openrouter:'pi-openrouter',kilo:'pi-kilo',cerebras:'pi-cerebras',groq:'pi-groq',buw:'pi-buw'};
  return `<span class="prov-icon ${c[p]||'pi-other'}">${m[p]||p.substring(0,2).toUpperCase()}</span>`;
};

// ── Navigation ─────────────────────────────────────────────────────
const ADMIN_PAGES = [
  { id:'dashboard',  icon:'▦', label:'Dashboard'      },
  { id:'users',      icon:'◎', label:'Users'           },
  { id:'roles',      icon:'◈', label:'Roles'           },
  { id:'rkeys',      icon:'⌗', label:'Router Keys'    },
  { id:'pkeys',      icon:'⊟', label:'Provider Keys'  },
  { id:'settings',   icon:'≡', label:'Settings'        },
  { id:'logs',       icon:'∷', label:'Audit Logs'      },
  { id:'proxies',    icon:'⊛', label:'Proxies'         },
  { id:'models',     icon:'◉', label:'Models'          },
];
const USER_PAGES = [
  { id:'my-keys',    icon:'⌗', label:'My API Keys'    },
  { id:'my-pkeys',   icon:'⊟', label:'My Providers'   },
  { id:'my-stats',   icon:'∿', label:'Usage'           },
  { id:'my-profile', icon:'◎', label:'Profile'         },
];

function buildNav() {
  const pages = S.user.is_admin ? ADMIN_PAGES : USER_PAGES;
  document.getElementById('sb-nav').innerHTML = pages.map(p =>
    `<div class="sb-link" id="nl-${p.id}" onclick="nav('${p.id}')">
      <span class="icon">${p.icon}</span>${esc(p.label)}
    </div>`
  ).join('');
}

function nav(page) {
  S.page = page;
  const pages = S.user.is_admin ? ADMIN_PAGES : USER_PAGES;
  pages.forEach(p => {
    const el = document.getElementById('nl-'+p.id);
    if (el) el.classList.toggle('active', p.id === page);
  });
  const pg = pages.find(p => p.id === page);
  document.getElementById('tb-title').textContent = pg ? pg.label : page;
  render(page);
}

async function render(page) {
  const ca = document.getElementById('content-area');
  ca.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
  try {
    switch(page) {
      case 'dashboard':  await renderDashboard(ca); break;
      case 'users':      await renderUsers(ca); break;
      case 'roles':      await renderRoles(ca); break;
      case 'rkeys':      await renderRouterKeys(ca); break;
      case 'pkeys':      await renderProviderKeys(ca); break;
      case 'settings':   await renderSettings(ca); break;
      case 'logs':       await renderLogs(ca); break;
      case 'proxies':    await renderProxies(ca); break;
      case 'models':     await renderModels(ca); break;
      case 'my-keys':    await renderMyKeys(ca); break;
      case 'my-pkeys':   await renderMyProviders(ca); break;
      case 'my-stats':   await renderMyStats(ca); break;
      case 'my-profile': await renderMyProfile(ca); break;
      default: ca.innerHTML = '<div class="empty"><div class="empty-icon">?</div><div class="empty-title">Page not found</div></div>';
    }
  } catch(e) {
    ca.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">Error</div><div class="empty-sub">${esc(e.message)}</div></div>`;
  }
}

async function renderDashboard(ca) {
  const s = await GET('/api/admin/stats');
  const total_req = (s.daily||[]).reduce((a,d)=>a+d.requests,0);
  const total_err = (s.daily||[]).reduce((a,d)=>a+d.errors,0);
  ca.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card cyan"><span class="stat-icon">◎</span><div class="stat-value">${s.user_count||0}</div><div class="stat-label">Total Users</div></div>
      <div class="stat-card blue"><span class="stat-icon">⌗</span><div class="stat-value">${s.key_count||0}</div><div class="stat-label">API Keys</div></div>
      <div class="stat-card green"><span class="stat-icon">∿</span><div class="stat-value">${total_req}</div><div class="stat-label">Requests (30d)</div></div>
      <div class="stat-card purple"><span class="stat-icon">⊛</span><div class="stat-value">${s.proxy_count||0}</div><div class="stat-label">Active Proxies</div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Request Volume (30 days)</div></div>
      <div class="card-body">${makeChart(s.daily||[])}</div>
    </div>`;
}

function makeChart(daily) {
  if (!daily.length) return '<div class="empty" style="padding:20px"><div class="empty-sub">No data yet</div></div>';
  const max = Math.max(...daily.map(d=>d.requests), 1);
  const bars = daily.slice(-20).map(d => {
    const h = Math.max(4, Math.round((d.requests/max)*72));
    return `<div class="chart-bar" style="height:${h}px">
      <div class="tip">${d.date}: ${d.requests} req, ${d.errors} err</div>
    </div>`;
  }).join('');
  return `<div class="chart-bars" style="padding-left:4px;padding-right:4px">${bars}</div>`;
}

  const r = await DEL(`/api/admin/users/${id}`);
  if (r.error) toast(r.error.message,'err');
  else { toast('User deleted'); nav('users'); }
}

function showKeyReveal(key, label, onClose) {
  openModal(`
    <div class="modal-title" style="color:var(--green)">✓ Key Generated</div>

window.copyKey = () => {
  const v = document.getElementById('kval')?.textContent;
  if (v) navigator.clipboard.writeText(v).then(()=>toast('Copied!')).catch(()=>prompt('Copy:',v));
};

async function revokeKey(path, page) {

  const r = await DEL(path);
  if (r.error) toast(r.error.message,'err');
  else { toast('Key revoked'); nav(page); }
}

async function createPKey(endpoint, page, isAdmin) {

      </div>
    </div>

    <!-- ── Actions ── -->
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn btn-primary" onclick="refreshProxies()">⟳ Refresh Pool Now</button>
      <span style="font-size:12px;color:var(--text2);align-self:center">Fetches a fresh proxy list from the source URL</span>
    </div>

    <!-- ── Proxy list ── -->
    <div class="card"><div class="card-body" style="padding:0"><div class="tbl-wrap">
    <table>
      <thead><tr><th>#</th><th>URL</th></tr></thead>
      <tbody>${proxies.length ? proxies.slice(0,100).map((p,i)=>`<tr>
        <td style="color:var(--text2);font-size:12px">${p.id}</td>
        <td><span class="mono" style="font-size:12px">${esc(p.url)}</span></td>
      </tr>`).join('') : `<tr><td colspan="2"><div class="empty"><div class="empty-icon">⊛</div><div class="empty-title">No proxies in pool</div>
        <div class="empty-sub">${enabled?'Click "Refresh Pool Now" to fetch proxies from the source URL.':'Enable proxy rotation above, then click Refresh Pool.'}</div></div></td></tr>`}
      ${proxies.length>100?`<tr><td colspan="2" style="text-align:center;color:var(--text2);padding:12px;font-size:12px">…and ${proxies.length-100} more</td></tr>`:''}
      </tbody>
    </table>
    </div></div></div>`;
}

async function toggleProxy(currentlyEnabled) {
  const newVal = currentlyEnabled ? '0' : '1';
  const r = await PUT('/api/admin/settings/proxy.enabled', {value: newVal});
  if (r.error) { toast(r.error.message,'err'); return; }
  if (newVal === '1') {
    toast('Proxy rotation enabled — refreshing pool…','info');
    await refreshProxies();
  } else {
    toast('Proxy rotation disabled');
  }
  nav('proxies');
}

async function refreshProxies() {
  const r = await POST('/api/admin/proxies/refresh');
  if (r.error) toast(r.error.message,'err');
  else {
    toast(`Proxy refresh started (${r.count_before||0} proxies before)`,'info');
    // Reload the page after a short delay to show updated count
    setTimeout(() => nav('proxies'), 2500);
  }
}

async function saveSettingVal(key, value) {
  const r = await PUT(`/api/admin/settings/${encodeURIComponent(key)}`, {value});
  if (r.error) toast(r.error.message,'err');
  else toast('Setting saved');
}

async function changePassword() {
  const p1 = document.getElementById('p-pw1').value;
  const p2 = document.getElementById('p-pw2').value;

  if (r.error) toast(r.error.message,'err');
  else toast('Password updated');
}

let setupStep = 0;
const setupData = {};

function renderSetupStep() {
  [0,1,2].forEach(i => {
    const d = document.getElementById('sdot'+i);
    if (d) d.className = 'step-dot' + (i < setupStep ? ' done' : i === setupStep ? ' active' : '');
  });
  const body = document.getElementById('setup-body');
  if (setupStep === 0) {
    body.innerHTML = `
      <div class="setup-title">Welcome to OMRP</div>
      <div class="setup-sub">Create the administrator account to get started.</div>
      <div class="form-group"><label class="form-label">Admin Username</label><input id="s-user" class="form-input" placeholder="admin"></div>
      <div class="form-group"><label class="form-label">Password (min 8 chars)</label><input id="s-pass" class="form-input" type="password" placeholder="••••••••"></div>
      <div class="form-group"><label class="form-label">Display Name (optional)</label><input id="s-name" class="form-input" placeholder="Administrator"></div>
      <div id="s-err" style="color:var(--red);font-size:12px;margin-top:8px;display:none"></div>
      <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="setupNext0()">Continue →</button>`;
  } else if (setupStep === 1) {
    body.innerHTML = `
      <div class="setup-title">Application Settings</div>
      <div class="setup-sub">Customize the name shown in the interface.</div>
      <div class="form-group"><label class="form-label">Application Name</label><input id="s-appname" class="form-input" value="OMRP" placeholder="OMRP"></div>
      <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="setupNext1()">Continue →</button>`;
  } else {
    body.innerHTML = `
      <div class="setup-title" style="color:var(--green)">✓ Setup Complete</div>
      <div class="setup-sub">Your OMRP instance is ready. Sign in with the credentials you created.</div>
      <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="goToLogin()">Go to Login →</button>`;
  }
}

async function setupNext0() {
  const user = document.getElementById('s-user').value.trim();
  const pass = document.getElementById('s-pass').value;
  const name = document.getElementById('s-name').value.trim();
  const err  = document.getElementById('s-err');
  if (!user || pass.length < 8) { err.style.display='block'; err.textContent='Username required, password ≥ 8 chars'; return; }
  const r = await POST('/api/setup', { username:user, password:pass, display_name:name||undefined });
  if (r.error) { err.style.display='block'; err.textContent=r.error.message; return; }
  setupData.username = user;
  setupData.password = pass;
  setupStep = 1;
  renderSetupStep();
}

function setupNext1() {
  setupData.appName = document.getElementById('s-appname').value.trim() || 'OMRP';
  setupStep = 2;
  renderSetupStep();
}

function goToLogin() {
  show('pg-login');
  document.getElementById('l-user').value = setupData.username || '';
}

//  AUTH
// ═══════════════════════════════════════════════════════════════════

async function doLogin() {
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!user || !pass) { errEl.style.display='block'; errEl.textContent='Please fill in both fields'; return; }
  const r = await POST('/api/auth/login', {username:user, password:pass});
  if (r.error) { errEl.style.display='block'; errEl.textContent=r.error.message; return; }
  S.token = r.token;
  S.user  = { user_id: r.user_id, username: r.username, is_admin: r.is_admin };
  localStorage.setItem('omrp_token', r.token);
  localStorage.setItem('omrp_user', JSON.stringify(S.user));
  startApp();
}

async function doLogout() {
  await POST('/api/auth/logout');
  S.token = null; S.user = null;
  localStorage.removeItem('omrp_token');
  localStorage.removeItem('omrp_user');
  show('pg-login');
}

function startApp() {
  document.getElementById('sb-username').textContent = S.user.username;
  document.getElementById('sb-role').innerHTML = S.user.is_admin
    ? '<span class="sb-badge admin">admin</span>'
    : '<span class="sb-badge user">user</span>';
  buildNav();
  show('pg-app');
  const defaultPage = S.user.is_admin ? 'dashboard' : 'my-keys';
  nav(defaultPage);
}

// ═══════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════

function show(id) {
  ['pg-loading','pg-login','pg-setup','pg-app'].forEach(p => {
    const el = document.getElementById(p);
    if (el) el.style.display = p === id ? (id==='pg-app'?'flex':'flex') : 'none';
  });
}

async function boot() {
  // 1. Check onboarding
  try {
    const st = await fetch('/api/setup/status').then(r=>r.json()).catch(()=>({}));
    if (st.onboarding_needed) {
      setupStep = 0;
      show('pg-setup');
      renderSetupStep();
      return;
    }
  } catch(_) {}

  // 2. Try to restore session
  const savedToken = localStorage.getItem('omrp_token');
  const savedUser  = localStorage.getItem('omrp_user');
  if (savedToken && savedUser) {
    S.token = savedToken;
    try {
      const me = await GET('/api/auth/me');
      if (!me.error) {
        S.user = { user_id: me.user_id, username: me.username, is_admin: me.is_admin };
        startApp();
        return;
      }
    } catch(_) {}
    S.token = null;
    localStorage.removeItem('omrp_token');
    localStorage.removeItem('omrp_user');
  }

  // 3. Load app name for login screen
  try {
    const r = await fetch('/api/admin/settings').then(r=>r.json()).catch(()=>({}));
    const n = (r.data||[]).find(s=>s.key==='app.name');
    if (n) { S.appName = n.value; document.getElementById('app-name').textContent = n.value; }
  } catch(_) {}

  show('pg-login');
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const luser = document.getElementById('l-user');
    const lpass = document.getElementById('l-pass');
    if (document.activeElement === luser || document.activeElement === lpass) doLogin();
  }
  if (e.key === 'Escape') closeModal();
});

// Boot
boot();
</script>
